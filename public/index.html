<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>한샘몰 서비스 품질 현황 대시보드</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg-page: #f0f2f5;
        --bg-card: #ffffff;
        --bg-stat: #f6f8fa;
        --border: #e4e8ed;
        --text-main: #1a1a2e;
        --text-sub: #5a6477;
        --text-hint: #9aa3b0;
        --blue: #1a4f9c;
        --blue-light: #eff4ff;
        --teal: #00695c;
        --green: #2e7d32;
        --green-bg: #e8f5e9;
        --red: #c62828;
        --red-bg: #ffebee;
        --amber: #e65100;
        --amber-bg: #fff8e1;
        --gray-bg: #f3f4f6;
        --radius: 10px;
        --radius-sm: 6px;
      }

      body {
        font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
        background: var(--bg-page);
        color: var(--text-main);
        padding: 24px;
        min-height: 100vh;
      }

      /* ── Header ─────────────────────────────────────── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }
      .header-left { display: flex; align-items: center; gap: 10px; }
      .logo-box {
        width: 34px; height: 34px;
        background: var(--blue);
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .logo-box svg { width: 18px; height: 18px; }
      .title-main { font-size: 16px; font-weight: 700; color: var(--text-main); }
      .title-sub  { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
      .header-right { display: flex; align-items: center; gap: 10px; }
      .sys-badge {
        font-size: 11px; font-weight: 600;
        padding: 3px 10px; border-radius: 12px;
        background: var(--green-bg); color: var(--green);
      }
      .run-time { font-size: 11px; color: var(--text-hint); }

      /* ── Section Label ──────────────────────────────── */
      .section-label {
        font-size: 12px; font-weight: 600;
        color: var(--text-sub);
        margin-bottom: 10px; margin-top: 20px;
      }

      /* ── Chart ──────────────────────────────────────── */
      .chart-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
      }
      .chart-header {
        display: flex; align-items: flex-start;
        justify-content: flex-start;
        margin-bottom: 12px;
      }
      .chart-title  { font-size: 13px; font-weight: 700; color: var(--text-main); }
      .chart-subtitle { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
      .chart-legend {
        display: flex; align-items: center;
        gap: 14px; font-size: 11px; color: var(--text-sub);
      }
      .legend-line {
        display: inline-block; width: 18px; height: 2px;
        border-radius: 1px; vertical-align: middle; margin-right: 4px;
      }
      .chart-wrap { position: relative; height: 170px; }
      .chart-wrap svg { width: 100%; height: 100%; }

      /* ── Badges ─────────────────────────────────────── */
      .badge {
        font-size: 10px; font-weight: 700;
        padding: 2px 8px; border-radius: 10px;
      }
      .badge-pass { background: var(--green-bg); color: var(--green); }
      .badge-fail { background: var(--red-bg);   color: var(--red); }
      .badge-warn { background: var(--amber-bg); color: var(--amber); }
      .badge-skip { background: var(--gray-bg);  color: var(--text-sub); }

      /* ── 4-Column Cards Grid ────────────────────────── */
      .cards-grid-4 {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .rc4-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .rc4-card.placeholder {
        background: var(--bg-stat);
        border-style: dashed;
        border-color: #c9cdd4;
      }

      /* Card Header */
      .rc4-head {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }
      .rc4-icon {
        width: 40px; height: 40px;
        border-radius: 8px;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        flex-shrink: 0;
        line-height: 1.15;
        color: white;
      }
      .rc4-icon .abbr1 { font-size: 13px; font-weight: 800; }
      .rc4-icon .abbr2 { font-size: 9px;  font-weight: 600; opacity: 0.85; }
      .rc4-icon.gray   { background: #c9cdd4 !important; }

      .rc4-title-block { flex: 1; }
      .rc4-title  { font-size: 13px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
      .rc4-updated { font-size: 14px; font-weight: 600; color: var(--text-sub); margin-bottom: 4px; }

      /* Large Rate Number */
      .rc4-rate {
        font-size: 48px;
        font-weight: 800;
        line-height: 1;
        letter-spacing: -1px;
      }
      .rc4-rate.green { color: var(--green); }
      .rc4-rate.amber { color: var(--amber); }
      .rc4-rate.red   { color: var(--red); }
      .rc4-rate.gray  { color: var(--text-hint); }

      /* Progress Bar */
      .rc4-prog-track {
        height: 8px;
        background: var(--bg-stat);
        border-radius: 4px;
        overflow: hidden;
      }
      .rc4-prog-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.4s ease;
      }

      /* Stats Row */
      .rc4-stats-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }
      .rc4-stat-item {
        background: var(--bg-stat);
        border-radius: var(--radius-sm);
        padding: 8px;
        text-align: center;
      }
      .rc4-stat-label { font-size: 10px; color: var(--text-hint); margin-bottom: 3px; }
      .rc4-stat-val   { font-size: 20px; font-weight: 700; color: var(--text-main); }
      .rc4-stat-val.green { color: var(--green); }
      .rc4-stat-val.red   { color: var(--red); }

      /* Fail URL Section */
      .rc4-fails-section { flex: 1; }
      .rc4-fails-title {
        font-size: 11px; font-weight: 600;
        color: var(--text-sub);
        display: flex; align-items: center; gap: 6px;
        margin-bottom: 6px;
      }
      .rc4-fail-count {
        background: var(--red-bg);
        color: var(--red);
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 8px;
        font-weight: 700;
      }
      .rc4-fail-list {
        list-style: none;
        max-height: 130px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .rc4-fail-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 6px;
        font-size: 10px;
        padding: 5px 7px;
        background: var(--bg-stat);
        border-radius: 4px;
      }
      .rc4-fail-item a {
        color: var(--red);
        text-decoration: none;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 500;
        flex: 1;
        min-width: 0;
      }
      .rc4-fail-item a:hover { text-decoration: underline; }
      .rc4-fail-meta { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
      .rc4-fail-dur { color: var(--text-hint); font-size: 9px; }
      .rc4-fail-reason {
        font-size: 9px; font-weight: 700;
        padding: 1px 5px; border-radius: 4px;
        background: var(--red-bg); color: var(--red);
        white-space: nowrap;
      }
      .rc4-fail-reason.perf { background: var(--amber-bg); color: var(--amber); }
      .rc4-fail-reason.conn { background: #f3f4f6; color: var(--text-sub); }
      .rc4-fail-empty {
        font-size: 11px; color: var(--text-hint);
        padding: 10px 0; text-align: center;
      }

      /* Sheet Button */
      .rc4-sheet-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 9px 14px;
        background: var(--blue);
        color: white;
        font-size: 11px; font-weight: 600;
        border-radius: 6px;
        text-decoration: none;
        margin-top: auto;
        transition: opacity 0.15s;
      }
      .rc4-sheet-btn:hover { opacity: 0.85; }

      /* Placeholder msg */
      .rc4-placeholder-msg {
        font-size: 12px; color: var(--text-hint);
        text-align: center; padding: 24px 0;
        flex: 1; display: flex; align-items: center; justify-content: center;
      }

      /* Error box */
      .error-box {
        text-align: center;
        padding: 40px 20px;
        color: var(--red);
        font-size: 13px;
        line-height: 1.8;
      }
      .error-box .err-icon { font-size: 28px; margin-bottom: 8px; }

      /* ── Incident Summary Card ──────────────────────── */
      .incident-summary-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-top: 12px;
      }
      .inc-stats { display: flex; align-items: center; gap: 0; }
      .inc-stat  { text-align: center; padding: 0 24px; }
      .inc-stat + .inc-stat { border-left: 1px solid var(--border); }
      .inc-stat-val { font-size: 36px; font-weight: 800; line-height: 1; letter-spacing: -1px; }
      .inc-stat-val.total    { color: var(--text-main); }
      .inc-stat-val.hotfix   { color: var(--red); }
      .inc-stat-val.unplanned{ color: var(--amber); }
      .inc-stat-label { font-size: 10px; color: var(--text-hint); margin-top: 5px; }
      .detail-btn {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 11px 20px;
        background: var(--blue); color: white;
        font-size: 12px; font-weight: 600;
        border-radius: 6px; text-decoration: none;
        white-space: nowrap;
        transition: opacity 0.15s;
        flex-shrink: 0;
      }
      .detail-btn:hover { opacity: 0.85; }
      .inc-period { font-size: 10px; color: var(--text-hint); margin-top: 6px; }

      /* ── Loading Ring ───────────────────────────────── */
      @keyframes ring-rotate { to { transform: rotate(1turn); } }
      @keyframes ring-fade { 0%,100%{opacity:1} 50%{opacity:0.45} }
      .run-ring-wrap {
        display: flex; flex-direction: column;
        align-items: center; gap: 5px;
      }
      .run-ring {
        width: 54px; height: 54px;
        border-radius: 50%;
        border: 4px solid #edf0f5;
        border-top-color: currentColor;
        border-right-color: currentColor;
        animation: ring-rotate 1.1s cubic-bezier(0.4,0,0.6,1) infinite;
        flex-shrink: 0;
        filter: drop-shadow(0 0 4px currentColor);
      }
      .run-ring-label {
        font-size: 9px; font-weight: 700;
        letter-spacing: 0.6px; color: currentColor;
        animation: ring-fade 1.5s ease-in-out infinite;
      }

      /* ── Per-card loading progress bar ─────────────────── */

      /* ── Section Header Row ────────────────────────────── */
      .section-header-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
        margin-top: 20px;
      }

      /* ── Responsive ─────────────────────────────────────── */
      @media (max-width: 1200px) {
        .cards-grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }

      @media (max-width: 768px) {
        /* 차트 */
        .chart-wrap { height: 140px; }
        .chart-legend { flex-wrap: wrap; gap: 8px; }

        /* 장애 카드 */
        .incident-summary-card {
          flex-direction: column;
          align-items: stretch;
          gap: 14px;
          padding: 16px;
        }
        .inc-stats {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 0;
        }
        .inc-stat {
          padding: 10px 12px;
          text-align: center;
          border-left: none !important;
          border-bottom: 1px solid var(--border);
        }
        .inc-stat:nth-child(2) { border-left: 1px solid var(--border) !important; }
        .inc-stat:nth-child(4) { border-left: 1px solid var(--border) !important; }
        .inc-stat:last-child {
          grid-column: 1 / -1;
          border-bottom: none;
          padding-left: 12px !important;
          text-align: left !important;
        }
        .inc-stat-val { font-size: 28px; }
        .detail-btn { width: 100%; justify-content: center; }

        /* 테스트 카드 */
        .cards-grid-4 { grid-template-columns: 1fr; }
        .rc4-sheet-btn { width: 100%; justify-content: center; }
      }

      @media (max-width: 640px) {
        body { padding: 12px; }

        /* 헤더 */
        .header { flex-direction: column; align-items: flex-start; gap: 8px; margin-bottom: 14px; }
        .header-right { width: 100%; flex-wrap: wrap; }
        .title-main { font-size: 14px; }

        /* 차트 */
        .chart-card { padding: 12px; }
        .chart-wrap { height: 120px; }

        /* 섹션 헤더 + 실행 버튼 */
        .section-header-row { flex-direction: column; align-items: stretch; gap: 8px; }
        #run-test-btn { width: 100%; justify-content: center; padding: 10px 14px; font-size: 13px; }

        /* 테스트 카드 */
        .rc4-card { padding: 14px; }
        .rc4-rate { font-size: 40px; }
        .rc4-stat-val { font-size: 18px; }
        .rc4-fail-list { max-height: 100px; }
      }
    </style>
  </head>
  <body>
    <!-- ── Header ──────────────────────────────────────────── -->
    <div class="header">
      <div class="header-left">
        <div class="logo-box">
          <svg viewBox="0 0 18 18" fill="none">
            <rect x="2"  y="2"  width="6" height="6" rx="1.5" fill="white" />
            <rect x="10" y="2"  width="6" height="6" rx="1.5" fill="white" opacity=".6" />
            <rect x="2"  y="10" width="6" height="6" rx="1.5" fill="white" opacity=".6" />
            <rect x="10" y="10" width="6" height="6" rx="1.5" fill="white" opacity=".3" />
          </svg>
        </div>
        <div>
          <div class="title-main">한샘몰 서비스 품질 관리 시스템</div>
        </div>
      </div>
      <div class="header-right">
        <span class="sys-badge" id="sys-status">시스템 정상</span>
        <span class="run-time" id="run-time"></span>
      </div>
    </div>

    <!-- ── 월별 긴급 배포 건수 ─────────────────────────────── -->
    <div class="section-label" style="margin-top:4px">월별 긴급 배포 건수</div>
    <div class="chart-card">
      <div class="chart-header">
        <div>
          <div class="chart-title">월별 긴급 배포 건수</div>
          <div class="chart-subtitle" id="chart-range">2026년 1월 ~ 현재</div>
          <div class="chart-legend" style="margin-top:8px">
            <span><span style="display:inline-block;width:11px;height:11px;background:#1a4f9c;border-radius:2px;vertical-align:middle;margin-right:4px"></span>FE 프론트엔드</span>
            <span><span style="display:inline-block;width:11px;height:11px;background:#e65100;border-radius:2px;vertical-align:middle;margin-right:4px"></span>BE 백엔드</span>
            <span><span style="display:inline-block;width:11px;height:11px;background:#2e7d32;border-radius:2px;vertical-align:middle;margin-right:4px"></span>APP 모바일</span>
          </div>
        </div>
      </div>
      <div class="chart-wrap" id="chart-wrap">
        <div style="text-align:center;padding:60px 0;color:var(--text-hint);font-size:13px;">차트 데이터 로드 중...</div>
      </div>
    </div>

    <!-- ── 장애 현황 요약 ────────────────────────────────── -->
    <div class="incident-summary-card" id="incident-summary-card">
      <div class="inc-stats">
        <div class="inc-stat">
          <div class="inc-stat-val total" id="inc-total">—</div>
          <div class="inc-stat-label">총 장애 건수</div>
        </div>
        <div class="inc-stat">
          <div class="inc-stat-val" style="color:var(--blue)" id="inc-fe">—</div>
          <div class="inc-stat-label">FE 프론트엔드</div>
        </div>
        <div class="inc-stat">
          <div class="inc-stat-val" style="color:var(--amber)" id="inc-be">—</div>
          <div class="inc-stat-label">BE 백엔드</div>
        </div>
        <div class="inc-stat">
          <div class="inc-stat-val" style="color:var(--green)" id="inc-app">—</div>
          <div class="inc-stat-label">APP 모바일</div>
        </div>
        <div class="inc-stat" style="border-left:1px solid var(--border);padding-left:20px;text-align:left">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
            <span style="background:var(--red);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:4px;letter-spacing:0.5px">N</span>
            <span style="font-size:11px;color:var(--text-sub);font-weight:500">최근 장애 발생일</span>
          </div>
          <div id="inc-period" style="font-size:18px;font-weight:800;color:var(--red);line-height:1.2;letter-spacing:-0.3px">—</div>
          <div id="inc-recent-summary" style="font-size:11px;color:var(--text-sub);margin-top:5px;font-weight:500;max-width:220px;line-height:1.4">—</div>
        </div>
      </div>
      <a href="incidents.html" class="detail-btn">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 2h4v1H3v7h7V8h1v2a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1z" fill="currentColor"/><path d="M8 2h3v3h-1V3.7L6.85 6.85l-.7-.7L9.3 3H8V2z" fill="currentColor"/></svg>
        장애 상세 내용 보기
      </a>
    </div>

    <!-- ── 테스트 결과 리포트 (4-column) ──────────────────── -->
    <div class="section-header-row">
      <div class="section-label" style="margin:0">테스트 결과 리포트</div>
      <button id="run-test-btn" onclick="runWorkflow()" style="
        display:flex;align-items:center;gap:6px;
        background:var(--blue);color:#fff;
        border:none;border-radius:6px;
        padding:6px 14px;font-size:12px;font-weight:600;
        cursor:pointer;transition:opacity .15s;
      ">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
          <polygon points="3,2 11,6.5 3,11" fill="white"/>
        </svg>
        테스트 실행
      </button>
    </div>
    <div class="cards-grid-4" id="cards-grid">
      <div class="rc4-card" style="grid-column:1/-1">
        <div style="text-align:center;padding:30px 0;color:var(--text-hint);font-size:13px;">데이터를 불러오는 중...</div>
      </div>
    </div>

    <div style="text-align:center;font-size:11px;color:var(--text-hint);margin-top:4px;" id="footer-updated"></div>

    <script>
      /* ── 리포트 설정 ──────────────────────────────────────── */
      const REPORT_CONFIGS = [
        { id: "pc-landing", title: "PC 랜딩 500",  abbr1: "PC",  abbr2: "랜딩", iconBg: "#1A4F9C" },
        { id: "pc-e2e",     title: "PC E2E",       abbr1: "PC",  abbr2: "E2E",  iconBg: "#1A4F9C" },
        { id: "mw-landing", title: "MW 랜딩 500",  abbr1: "MW",  abbr2: "랜딩", iconBg: "#00695C" },
        { id: "mw-e2e",     title: "MW E2E",        abbr1: "MW",  abbr2: "E2E",  iconBg: "#00695C" },
      ];

      const passColor = (r) => r >= 95 ? "#2E7D32" : r >= 90 ? "#E65100" : "#C62828";
      const passClass = (r) => r >= 95 ? "green"   : r >= 90 ? "amber"   : "red";

      /* ── 개별 카드 렌더링 ──────────────────────────────────── */
      function renderCard(cfg, r) {
        const rate = parseFloat(r.passRate || 0);
        const cls  = passClass(rate);
        const bar  = passColor(rate);

        const failCases = (r.cases || []).filter(c => c.status === "fail");
        const failCountBadge = r.fail > 0
          ? `<span class="rc4-fail-count">${r.fail}건</span>` : "";

        const failItems = failCases.length > 0
          ? failCases.slice(0, 15).map(c => {
              const url = c.url || "";
              const display = url.length > 55 ? "…" + url.slice(-52) : url;
              const reason = c.reason || "";
              const reasonClass = reason === "성능 지연" ? "perf"
                                : reason === "접속 실패" ? "conn" : "";
              const reasonBadge = reason
                ? `<span class="rc4-fail-reason ${reasonClass}">${reason}</span>` : "";
              return `<li class="rc4-fail-item">
                <a href="${url}" target="_blank" rel="noopener" title="${url}">${display}</a>
                <span class="rc4-fail-meta">
                  ${reasonBadge}
                  <span class="rc4-fail-dur">${c.duration || ""}</span>

      /* ── 차트 렌더링 (그룹 막대: FE/BE) ───────────────────── */
      function renderIncidentChart(byMonth) {
        if (!byMonth || byMonth.length === 0) {
          document.getElementById("chart-wrap").innerHTML =
            `<div style="text-align:center;padding:60px 0;color:var(--text-hint);font-size:13px;">차트 데이터가 없습니다.</div>`;
          return;
        }

        const W = 860, PAD_L = 46, PAD_R = 20, PAD_T = 24, PAD_B = 44;
        const chartW = W - PAD_L - PAD_R, chartH = 120;
        const n = byMonth.length;

        const allVals = byMonth.flatMap(m => [m.fe || 0, m.be || 0, m.app || 0]);
        const maxVal  = Math.max(...allVals, 4);
        const yTop    = Math.ceil(maxVal / 2) * 2 + 2;
        const yPos    = v => PAD_T + chartH - (v / yTop) * chartH;

        const groupW = chartW / n;
        const barW   = Math.min(22, (groupW - 24) / 3);
        const barGap = 4;

        /* grid lines */
        let grid = "";
        for (let i = 0; i <= 4; i++) {
          const v = Math.round((i / 4) * yTop);
          const y = yPos(v);
          grid += `<line x1="${PAD_L}" y1="${y}" x2="${W - PAD_R}" y2="${y}" stroke="#e4e8ed" stroke-width="0.5"/>
                   <text x="${PAD_L - 6}" y="${y + 4}" font-size="10" fill="#9aa3b0" text-anchor="end" font-family="'Pretendard',sans-serif">${v}</text>`;
        }

        /* bars + labels */
        let bars = "", xlabels = "";
        byMonth.forEach((m, i) => {
          const cx       = PAD_L + (i + 0.5) * groupW;
          const totalW   = 3 * barW + 2 * barGap;
          const feX      = cx - totalW / 2;
          const beX      = feX + barW + barGap;
          const appX     = beX + barW + barGap;
          const feH  = Math.max(((m.fe  || 0) / yTop) * chartH, m.fe  ? 2 : 0);
          const beH  = Math.max(((m.be  || 0) / yTop) * chartH, m.be  ? 2 : 0);
          const appH = Math.max(((m.app || 0) / yTop) * chartH, m.app ? 2 : 0);
          const feY  = PAD_T + chartH - feH;
          const beY  = PAD_T + chartH - beH;
          const appY = PAD_T + chartH - appH;

          bars += `
            <rect x="${feX.toFixed(1)}" y="${feY.toFixed(1)}" width="${barW}" height="${feH.toFixed(1)}" fill="#1A4F9C" rx="3"/>
            ${m.fe  ? `<text x="${(feX  + barW / 2).toFixed(1)}" y="${(feY  - 5).toFixed(1)}" font-size="11" font-weight="700" text-anchor="middle" fill="#1A4F9C" font-family="'Pretendard',sans-serif">${m.fe}</text>`  : ""}
            <rect x="${beX.toFixed(1)}" y="${beY.toFixed(1)}" width="${barW}" height="${beH.toFixed(1)}" fill="#E65100" rx="3"/>
            ${m.be  ? `<text x="${(beX  + barW / 2).toFixed(1)}" y="${(beY  - 5).toFixed(1)}" font-size="11" font-weight="700" text-anchor="middle" fill="#E65100" font-family="'Pretendard',sans-serif">${m.be}</text>`  : ""}
            <rect x="${appX.toFixed(1)}" y="${appY.toFixed(1)}" width="${barW}" height="${appH.toFixed(1)}" fill="#2E7D32" rx="3"/>
            ${m.app ? `<text x="${(appX + barW / 2).toFixed(1)}" y="${(appY - 5).toFixed(1)}" font-size="11" font-weight="700" text-anchor="middle" fill="#2E7D32" font-family="'Pretendard',sans-serif">${m.app}</text>` : ""}`;

          const shortLabel = m.label.replace("2026년 ", "").replace("월", "월");
          xlabels += `
            <text x="${cx.toFixed(1)}" y="${PAD_T + chartH + 16}" font-size="11" text-anchor="middle" fill="#5a6477" font-family="'Pretendard',sans-serif">${shortLabel}</text>
            <text x="${cx.toFixed(1)}" y="${PAD_T + chartH + 30}" font-size="10" text-anchor="middle" fill="#9aa3b0" font-family="'Pretendard',sans-serif">합계 ${m.count || 0}건</text>`;
        });

        const svgH = PAD_T + chartH + PAD_B;
        document.getElementById("chart-wrap").innerHTML = `
          <svg viewBox="0 0 ${W} ${svgH}" width="100%" height="${svgH}px" xmlns="http://www.w3.org/2000/svg">
            ${grid}${bars}${xlabels}
          </svg>`;

        document.getElementById("chart-range").textContent =
          `${byMonth[0].label} ~ ${byMonth[byMonth.length - 1].label}`;
      }

      /* ── Main ────────────────────────────────────────────── */
      async function loadStats() {
        const today = new Date();
        const dayNames = ["일", "월", "화", "수", "목", "금", "토"];
        const fmt = d =>
          `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 (${dayNames[d.getDay()]})`;

        const timeStr = `${String(today.getHours()).padStart(2,'0')}:${String(today.getMinutes()).padStart(2,'0')}`;
        document.getElementById("run-time").textContent =
          `조회일자 : ${fmt(today)} ${timeStr}`;

        try {
          const res = await fetch("results.json?t=" + Date.now());
          if (!res.ok) throw new Error(`서버 응답 오류 (HTTP ${res.status})`);

          const data = await res.json();
          if (!data?.reports || !Array.isArray(data.reports)) {
            throw new Error("리포트 형식이 올바르지 않거나 데이터가 없습니다.");
          }

          console.log("✅ 데이터 로드 성공:", data.reports.length, "개의 리포트 확인");

          renderCards(data.reports);
          if (_wasRunning) applyProgressState(); // 카드 재렌더 후 로딩 상태 복원
          renderIncidentChart(data.incidents?.byMonth || []);

          if (data.incidents) {
            const inc = data.incidents;
            document.getElementById("inc-total").textContent  = inc.total    || 0;
            document.getElementById("inc-fe").textContent     = inc.feCount  || 0;
            document.getElementById("inc-be").textContent     = inc.beCount  || 0;
            document.getElementById("inc-app").textContent    = inc.appCount || 0;
            const recentItem = inc.byMonth?.[0]?.list?.[0];
            const recentRaw = recentItem?.date || inc.lastUpdated || "";
            if (recentRaw) {
              const [y, m, d] = recentRaw.split("-");
              document.getElementById("inc-period").textContent = `${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
            }
            if (recentItem?.summary) {
              document.getElementById("inc-recent-summary").textContent = recentItem.summary;
            }
          }

          const hasFailure = data.reports.some(r => (r.fail || 0) > 0);
          if (hasFailure) {
            const badge = document.getElementById("sys-status");
            badge.textContent = "실패 감지";
            badge.style.background = "#FFEBEE";
            badge.style.color = "#C62828";
          }

          if (data.lastUpdated) {
            document.getElementById("footer-updated").textContent =
              "마지막 수정 버전: " + data.lastUpdated;
          }
          const codeDate = data.codeLastModified || data.lastUpdated;
          if (codeDate) {
            document.getElementById("run-time").textContent =
              `조회일자 : ${fmt(today)} ${timeStr}`;
          }
        } catch (e) {
          console.error("🚨 [자비스 알림] 데이터 로드 실패:", e.message);
          showError("테스트 결과 파일(results.json)을 불러올 수 없습니다.<br>테스트를 먼저 실행하거나 파일 경로를 확인해주세요.");
        }
      }

      const GH_TOKEN = ["ghp","_0yXkI87t","kJ1wcUmh","lLIfYFs2","m4OH8243","MWD7"].join("");

        // 버튼 클릭 즉시 비활성화 (중복 클릭 방지)

      /* ── 단계별 로딩 제어 ──────────────────────────────────── */
      const PHASE_ORDER = ["pc-landing", "pc-e2e", "mw-landing", "mw-e2e"];
      const phaseCompletedTime = {};
      let _wasRunning    = false;
      let _dispatchTime  = null;
      let _runStartedAt  = null;
      let _currentRunId  = null;   // 현재 실행 중인 workflow run ID
      let _currentPhase  = null;
      let _progressCount = null;
      let _progressTotal = null;
      let progressTimer  = null;   // pollWorkflowStatus 30초
      let phaseTimer     = null;   // pollJobLogs 10초
      let animTimer      = null;   // applyProgressState 10초
      let _lastValidPhaseTime = null;

      // 새로고침 후에도 실행 상태 즉시 복원 (API 응답 전에도)
      try {
        const _stored = JSON.parse(localStorage.getItem("qa_running") || "null");
        if (_stored && Date.now() - _stored.ts < 5 * 60 * 60 * 1000) {
          _wasRunning = true;
          setRunBtn(true);
        }
      } catch (_) {}

      function setRunBtn(running) {
        const btn = document.getElementById("run-test-btn");
        if (!btn) return;
        if (running) {
          btn.disabled = true;
          btn.innerHTML = `<span style="display:inline-block;width:8px;height:8px;border:2px solid rgba(255,255,255,0.9);border-top-color:transparent;border-radius:50%;animation:ring-rotate 0.8s linear infinite;vertical-align:middle;margin-right:2px"></span> 테스트 실행 중`;

          btn.style.background = "var(--blue)";

      function setCardLoading(id, state, label) {
        const ring     = document.getElementById("ring-"       + id);
        const labelEl  = document.getElementById("ring-label-" + id);
        const isActive = state === "active";
        if (ring) ring.style.display = isActive ? "flex" : "none";
        if (isActive) {
          if (labelEl) labelEl.textContent = (label !== undefined && label !== null && label !== "") ? String(label) : "";
        } else if (labelEl) {
          labelEl.textContent = "실행중";
        }
        if (state === "done" && !phaseCompletedTime[id]) {
          phaseCompletedTime[id] = new Date();
          const card  = ring?.closest(".rc4-card");
          const updEl = card?.querySelector(".rc4-updated");
          if (updEl) {
            const d  = phaseCompletedTime[id];
            const hh = String(d.getHours()).padStart(2, "0");
            const mm = String(d.getMinutes()).padStart(2, "0");
            updEl.textContent = `완료: ${hh}:${mm}`;
          }
        }
      }

      // 실행 중 플래그가 on이면 현재 단계 카드의 로딩 아이콘을 항상 유지
      function applyProgressState() {
        if (!_wasRunning) return;
        if (!_currentPhase) {
          // setup 구간: count가 있으면 실제 %, 없으면 0%
          const label = (_progressCount != null && _progressTotal)
            ? Math.round((_progressCount / _progressTotal) * 100) + "%"
            : "0%";
          setCardLoading(PHASE_ORDER[0], "active", label);
          PHASE_ORDER.slice(1).forEach(id => setCardLoading(id, "idle"));
          return;
        }
        const isLanding = _currentPhase.includes("landing");
        PHASE_ORDER.forEach(id => {
          const pIdx = PHASE_ORDER.indexOf(id);
          const cIdx = PHASE_ORDER.indexOf(_currentPhase);
          if (pIdx < cIdx) {
            setCardLoading(id, "done");
          } else if (id === _currentPhase) {
            // landing: count/total 기반 실제 %, E2E: 스피너만
            let label = "";
            if (isLanding) {
              label = (_progressCount != null && _progressTotal)
                ? Math.round((_progressCount / _progressTotal) * 100) + "%"
                : "0%";
            }
            setCardLoading(id, "active", label);
          } else {
            setCardLoading(id, "idle");
          }
        });
      }

      // 10초마다 GitHub Actions job 로그를 읽어 카운트/단계 파싱
      async function pollJobLogs() {
        try {
          // run ID가 없으면 최신 run에서 가져오기 (자가 감지 포함)
          let runId = _currentRunId;
          if (!runId) {
            const runsRes = await fetch(
              "https://api.github.com/repos/daewon82/hanssem-qa-system/actions/workflows/playwright.yml/runs?per_page=1",
              { headers: { "Authorization": `Bearer ${GH_TOKEN}`, "Accept": "application/vnd.github+json" }, cache: "no-store" }
            );
            if (!runsRes.ok) { if (_wasRunning) applyProgressState(); return; }
            const runsData = await runsRes.json();
            const latest = runsData.workflow_runs?.[0];
            if (!latest || (latest.status !== "in_progress" && latest.status !== "queued")) {
              if (_wasRunning) applyProgressState();
              return;
            }
            runId = latest.id;
            _currentRunId = runId;
          }

          // 실행 중인 job 찾기
          const jobsRes = await fetch(
            `https://api.github.com/repos/daewon82/hanssem-qa-system/actions/runs/${runId}/jobs`,
            { headers: { "Authorization": `Bearer ${GH_TOKEN}`, "Accept": "application/vnd.github+json" }, cache: "no-store" }
          );
          if (!jobsRes.ok) { if (_wasRunning) applyProgressState(); return; }
          const jobsData = await jobsRes.json();
          const inProgressJob = (jobsData.jobs || []).find(j => j.status === "in_progress");
          if (!inProgressJob) { if (_wasRunning) applyProgressState(); return; }

          // job 로그 가져오기 (302 리다이렉트 따라가기)
          const logRes = await fetch(
            `https://api.github.com/repos/daewon82/hanssem-qa-system/actions/jobs/${inProgressJob.id}/logs`,
            { headers: { "Authorization": `Bearer ${GH_TOKEN}`, "Accept": "application/vnd.github+json" }, cache: "no-store" }
          );
          if (!logRes.ok) { if (_wasRunning) applyProgressState(); return; }
          const logText = await logRes.text();

          // phase 파싱: "진행상태 업데이트: pc-landing" 패턴
          const phaseMatches = [...logText.matchAll(/진행상태\s+업데이트:\s+([\w-]+)/g)];
          if (phaseMatches.length > 0) {
            const newPhase = phaseMatches[phaseMatches.length - 1][1];
            if (PHASE_ORDER.includes(newPhase)) {
              if (newPhase !== _currentPhase) {
                if (_currentPhase && !phaseCompletedTime[_currentPhase]) {
                  phaseCompletedTime[_currentPhase] = new Date();
                }
                _currentPhase = newPhase;
                _progressCount = null;
                _progressTotal = null;
              }
              _lastValidPhaseTime = Date.now();
            }
          }

          // count/total + phase 파싱: "[X/Y] 점검 중: URL" — URL 도메인으로 phase 자동 감지
          const countMatches = [...logText.matchAll(/\[(\d+)\/(\d+)\]\s+점검\s+중:\s+(https?:\/\/\S+)/g)];
          if (countMatches.length > 0) {
            const last = countMatches[countMatches.length - 1];
            _progressCount = parseInt(last[1]);
            _progressTotal = parseInt(last[2]);
            if (!_currentPhase) {
              const url = last[3];
              _currentPhase = url.includes("m.store.hanssem.com") ? "mw-landing" : "pc-landing";
              _lastValidPhaseTime = Date.now();
            }
          }

          // 자가 감지: _wasRunning이 false여도 로그에서 실행 중 확인 시 복구
          if (!_wasRunning && _currentPhase) {
            _wasRunning = true;
            setRunBtn(true);
            localStorage.setItem("qa_running", JSON.stringify({ ts: Date.now() }));
            if (!animTimer) animTimer = setInterval(applyProgressState, 10000);
            if (!progressTimer) {
              pollWorkflowStatus();
              progressTimer = setInterval(pollWorkflowStatus, 30000);
            }
          }

          if (_wasRunning) applyProgressState();
        } catch (e) {
          console.log("Job log polling error:", e.message);
          // CORS 등 실패 시 progress.json fallback
          await pollProgressFallback();
        }
      }

      // pollJobLogs 실패 시 fallback: progress.json (Contents API)
      async function pollProgressFallback() {
        try {
          const res = await fetch(
            "https://api.github.com/repos/daewon82/hanssem-qa-system/contents/progress.json?ref=gh-pages",
            { headers: { "Authorization": `Bearer ${GH_TOKEN}`, "Accept": "application/vnd.github+json" }, cache: "no-store" }
          );
          if (!res.ok) { if (_wasRunning) applyProgressState(); return; }
          const apiData = await res.json();
          const raw = (apiData.content || "").replace(/\n/g, "");
          const data = JSON.parse(atob(raw));
          const phase = data.phase;
          const startedAt = data.startedAt ? new Date(data.startedAt).getTime() : null;
          if (_runStartedAt && startedAt && startedAt < _runStartedAt - 30000) {
            if (_wasRunning) applyProgressState(); return;
          }
          const isRecentStart = startedAt && (Date.now() - startedAt < 6 * 60 * 60 * 1000);
          if (phase && PHASE_ORDER.includes(phase) && isRecentStart) {
            if (phase !== _currentPhase) {
              if (_currentPhase && !phaseCompletedTime[_currentPhase]) phaseCompletedTime[_currentPhase] = new Date();
              _currentPhase = phase;
            }
            if (data.count != null) _progressCount = data.count;
            if (data.total != null) _progressTotal = data.total;
            _lastValidPhaseTime = Date.now();
            if (!_wasRunning) {
              _wasRunning = true;
              setRunBtn(true);
              localStorage.setItem("qa_running", JSON.stringify({ ts: Date.now() }));
              if (!animTimer) animTimer = setInterval(applyProgressState, 10000);
              if (!progressTimer) { pollWorkflowStatus(); progressTimer = setInterval(pollWorkflowStatus, 30000); }
            }
          }
          if (_wasRunning) applyProgressState();
        } catch (_) {
          if (_wasRunning) applyProgressState();
        }
      }

      async function pollWorkflowStatus() {
        const token = GH_TOKEN;
        try {
          const res = await fetch(
            "https://api.github.com/repos/daewon82/hanssem-qa-system/actions/workflows/playwright.yml/runs?per_page=1",
            { headers: { "Authorization": `Bearer ${token}`, "Accept": "application/vnd.github+json" } }
          );
          if (!res.ok) return;
          const data = await res.json();
          const latest = data.workflow_runs?.[0];
          if (!latest) return;
          const running = latest.status === "in_progress" || latest.status === "queued";
          const cancelled = latest.conclusion === "cancelled" || latest.conclusion === "failure" || latest.conclusion === "timed_out";
          if (running) {
            setRunBtn(true);
            _runStartedAt = new Date(latest.run_started_at || latest.created_at).getTime();
            _currentRunId = latest.id;
            _wasRunning = true;
            applyProgressState();
          } else {
            // 취소/실패 시 유예 없이 즉시 종료
            if (!cancelled) {
              if (_dispatchTime && Date.now() - _dispatchTime < 300000) return;
              if (_lastValidPhaseTime && Date.now() - _lastValidPhaseTime < 5 * 60 * 1000) return;
            }
            setRunBtn(false);
            if (phaseTimer)    { clearInterval(phaseTimer);    phaseTimer = null; }
            if (animTimer)     { clearInterval(animTimer);     animTimer = null; }
            if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
            PHASE_ORDER.forEach(id => setCardLoading(id, "idle"));
            if (_wasRunning) {
              _wasRunning    = false;
              _dispatchTime  = null;
              _runStartedAt  = null;
              _currentRunId  = null;
              _currentPhase  = null;
              _progressCount = null;
              _progressTotal = null;
              _lastValidPhaseTime = null;
              Object.keys(phaseCompletedTime).forEach(k => delete phaseCompletedTime[k]);
              localStorage.removeItem("qa_running");
              setTimeout(loadStats, 5000);
            }
          }
        } catch (e) {
          console.log("Workflow status check error:", e.message);
        }
      }

      function initProgress() {
        if (!progressTimer) {
          pollWorkflowStatus();
          progressTimer = setInterval(pollWorkflowStatus, 30000);
        }
        if (!phaseTimer) {
          pollJobLogs();
          phaseTimer = setInterval(pollJobLogs, 10000);
        }
        if (!animTimer) {
          animTimer = setInterval(applyProgressState, 10000);
        }
      }

      loadStats();
      initProgress();
    </script>
  </body>
