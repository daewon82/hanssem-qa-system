<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>한샘몰 서비스 품질 관리 시스템</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg-page: #f0f2f5;
        --bg-card: #ffffff;
        --bg-stat: #f6f8fa;
        --border: #e4e8ed;
        --text-main: #1a1a2e;
        --text-sub: #5a6477;
        --text-hint: #9aa3b0;
        --blue: #1a4f9c;
        --blue-light: #eff4ff;
        --green: #2e7d32;
        --green-bg: #e8f5e9;
        --red: #c62828;
        --red-bg: #ffebee;
        --amber: #e65100;
        --amber-bg: #fff8e1;
        --gray-bg: #f3f4f6;
        --radius: 10px;
        --radius-sm: 6px;
      }

      body {
        font-family:
          "Pretendard",
          -apple-system,
          BlinkMacSystemFont,
          "Apple SD Gothic Neo",
          sans-serif;
        background: var(--bg-page);
        color: var(--text-main);
        padding: 24px;
        min-height: 100vh;
      }

      /* ── Header ─────────────────────────────────────────── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }
      .header-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo-box {
        width: 34px;
        height: 34px;
        background: var(--blue);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .logo-box svg {
        width: 18px;
        height: 18px;
      }
      .title-main {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-main);
      }
      .title-sub {
        font-size: 11px;
        color: var(--text-hint);
        margin-top: 2px;
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .sys-badge {
        font-size: 11px;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 12px;
        background: var(--green-bg);
        color: var(--green);
      }
      .run-time {
        font-size: 11px;
        color: var(--text-hint);
      }

      /* ── Section label ───────────────────────────────────── */
      .section-label {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-sub);
        margin-bottom: 10px;
        margin-top: 4px;
      }

      /* ── KPI row ─────────────────────────────────────────── */
      .kpi-row {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 16px;
      }
      .kpi {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 15px;
      }
      .kpi-label {
        font-size: 11px;
        color: var(--text-sub);
        margin-bottom: 6px;
      }
      .kpi-val {
        font-size: 22px;
        font-weight: 700;
        color: var(--text-main);
        line-height: 1;
      }
      .kpi-val .unit {
        font-size: 13px;
        font-weight: 400;
        color: var(--text-hint);
      }
      .kpi-val.green {
        color: var(--green);
      }
      .kpi-val.red {
        color: var(--red);
      }
      .kpi-val.amber {
        color: var(--amber);
      }
      .kpi-delta {
        font-size: 11px;
        color: var(--text-hint);
        margin-top: 5px;
      }
      .kpi-bar {
        height: 3px;
        border-radius: 2px;
        margin-top: 9px;
        background: var(--bg-stat);
        overflow: hidden;
      }
      .kpi-bar-fill {
        height: 100%;
        border-radius: 2px;
      }

      /* ── Reports grid ────────────────────────────────────── */
      .reports-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 14px;
      }
      .report-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
      }
      .rc-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 13px;
      }
      .rc-title-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .rc-icon {
        width: 26px;
        height: 26px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        flex-shrink: 0;
      }
      .rc-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-main);
      }
      .rc-meta {
        font-size: 11px;
        color: var(--text-hint);
      }

      /* status badges */
      .badge {
        font-size: 10px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 10px;
      }
      .badge-pass {
        background: var(--green-bg);
        color: var(--green);
      }
      .badge-fail {
        background: var(--red-bg);
        color: var(--red);
      }
      .badge-warn {
        background: var(--amber-bg);
        color: var(--amber);
      }
      .badge-skip {
        background: var(--gray-bg);
        color: var(--text-sub);
      }

      /* stat boxes */
      .rc-stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 12px;
      }
      .rc-stat {
        background: var(--bg-stat);
        border-radius: var(--radius-sm);
        padding: 8px 10px;
      }
      .rc-stat-label {
        font-size: 10px;
        color: var(--text-hint);
        margin-bottom: 3px;
      }
      .rc-stat-val {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-main);
      }
      .rc-stat-val.green {
        color: var(--green);
      }
      .rc-stat-val.red {
        color: var(--red);
      }
      .rc-stat-val.amber {
        color: var(--amber);
      }
      .rc-stat-val.gray {
        color: var(--text-hint);
      }

      /* mini table */
      .mini-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
      }
      .mini-table th {
        text-align: left;
        padding: 4px 8px;
        color: var(--text-hint);
        font-weight: 600;
        font-size: 10px;
        border-bottom: 1px solid var(--border);
      }
      .mini-table td {
        padding: 6px 8px;
        border-bottom: 1px solid var(--border);
        color: var(--text-main);
        vertical-align: middle;
      }
      .mini-table tr:last-child td {
        border-bottom: none;
      }
      .mini-table tr:hover td {
        background: var(--bg-stat);
      }

      /* dot & chip */
      .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        margin-right: 4px;
        vertical-align: middle;
      }
      .dot-g {
        background: #4caf50;
      }
      .dot-r {
        background: #f44336;
      }
      .dot-a {
        background: #ff9800;
      }
      .dot-s {
        background: #9e9e9e;
      }

      .chip {
        display: inline-block;
        font-size: 10px;
        font-weight: 600;
        padding: 1px 6px;
        border-radius: 8px;
      }
      .chip-b {
        background: var(--blue-light);
        color: var(--blue);
      }
      .chip-r {
        background: var(--red-bg);
        color: var(--red);
      }
      .chip-g {
        background: var(--green-bg);
        color: var(--green);
      }
      .chip-a {
        background: var(--amber-bg);
        color: var(--amber);
      }
      .chip-s {
        background: var(--gray-bg);
        color: var(--text-sub);
      }

      /* progress bar row */
      .prog-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 11px;
      }
      .prog-label {
        font-size: 11px;
        color: var(--text-sub);
        min-width: 56px;
      }
      .prog-track {
        flex: 1;
        height: 6px;
        background: var(--bg-stat);
        border-radius: 3px;
        overflow: hidden;
      }
      .prog-fill {
        height: 100%;
        border-radius: 3px;
      }
      .prog-val {
        font-size: 11px;
        font-weight: 700;
        color: var(--text-main);
        min-width: 36px;
        text-align: right;
      }

      /* ── Chart card ──────────────────────────────────────── */
      .chart-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
      }
      .chart-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .chart-title {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-main);
      }
      .chart-subtitle {
        font-size: 11px;
        color: var(--text-hint);
        margin-top: 2px;
      }
      .chart-legend {
        display: flex;
        align-items: center;
        gap: 14px;
        font-size: 11px;
        color: var(--text-sub);
      }
      .legend-line {
        display: inline-block;
        width: 18px;
        height: 2px;
        border-radius: 1px;
        vertical-align: middle;
        margin-right: 4px;
      }
      .chart-wrap {
        position: relative;
        height: 170px;
      }
      .chart-wrap svg {
        width: 100%;
        height: 100%;
      }

      /* ── Error state ─────────────────────────────────────── */
      .error-box {
        text-align: center;
        padding: 40px 20px;
        color: var(--red);
        font-size: 13px;
        line-height: 1.8;
      }
      .error-box .err-icon {
        font-size: 28px;
        margin-bottom: 8px;
      }

      /* ── Responsive ──────────────────────────────────────── */
      @media (max-width: 900px) {
        .kpi-row {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }
      @media (max-width: 640px) {
        body {
          padding: 14px;
        }
        .kpi-row {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .reports-grid {
          grid-template-columns: 1fr;
        }
        .rc-stats {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="logo-box">
          <svg viewBox="0 0 18 18" fill="none">
            <rect x="2" y="2" width="6" height="6" rx="1.5" fill="white" />
            <rect
              x="10"
              y="2"
              width="6"
              height="6"
              rx="1.5"
              fill="white"
              opacity=".6"
            />
            <rect
              x="2"
              y="10"
              width="6"
              height="6"
              rx="1.5"
              fill="white"
              opacity=".6"
            />
            <rect
              x="10"
              y="10"
              width="6"
              height="6"
              rx="1.5"
              fill="white"
              opacity=".3"
            />
          </svg>
        </div>
        <div>
          <div class="title-main">한샘몰 서비스 품질 관리 시스템</div>
          <div class="title-sub">JARVIS QMS Dashboard</div>
        </div>
      </div>
      <div class="header-right">
        <span class="sys-badge" id="sys-status">시스템 정상</span>
        <span class="run-time" id="run-time"></span>
      </div>
    </div>

    <!-- 1. KPI -->
    <div class="section-label" id="kpi-date-label">오늘의 품질 지표</div>
    <div class="kpi-row" id="kpi-row">
      <div class="kpi"><div class="kpi-label">데이터 로드 중...</div></div>
    </div>

    <!-- 2~5. Test reports -->
    <div class="section-label">테스트 결과 리포트</div>
    <div class="reports-grid" id="reports-grid">
      <div class="report-card" style="grid-column: 1/-1">
        <div
          style="
            text-align: center;
            padding: 30px 0;
            color: var(--text-hint);
            font-size: 13px;
          "
        >
          데이터를 불러오는 중...
        </div>
      </div>
    </div>

    <!-- 6. Chart -->
    <div class="section-label">월별 긴급 배포 건수</div>
    <div class="chart-card">
      <div class="chart-header">
        <div>
          <div class="chart-title">월별 긴급 배포 건수</div>
          <div class="chart-subtitle" id="chart-range">2026년 1월 ~ 현재</div>
        </div>
        <div class="chart-legend">
          <span
            ><span class="legend-line" style="background: #1a4f9c"></span>긴급
            배포</span
          >
          <span
            ><span
              class="legend-line"
              style="
                background: #f44336;
                border-top: 2px dashed #f44336;
                height: 0;
              "
            ></span
            >임계치 (5건)</span
          >
        </div>
      </div>
      <div class="chart-wrap" id="chart-wrap">
        <div
          style="
            text-align: center;
            padding: 60px 0;
            color: var(--text-hint);
            font-size: 13px;
          "
        >
          차트 데이터 로드 중...
        </div>
      </div>
    </div>

    <div
      style="
        text-align: center;
        font-size: 11px;
        color: var(--text-hint);
        margin-top: 18px;
      "
      id="footer-updated"
    ></div>

    <script>
      /* ─────────────────────────────────────────────────────────
   Helpers
───────────────────────────────────────────────────────── */
      const today = new Date();
      const dayNames = ["일", "월", "화", "수", "목", "금", "토"];
      const fmt = (d) =>
        `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 (${dayNames[d.getDay()]})`;

      function statusDot(s) {
        const m = {
          pass: "dot-g",
          fail: "dot-r",
          warn: "dot-a",
          skip: "dot-s",
        };
        return `<span class="dot ${m[s] || "dot-s"}"></span>`;
      }
      function statusLabel(s) {
        const m = { pass: "통과", fail: "실패", warn: "경고", skip: "스킵" };
        return m[s] || s;
      }
      function chipHtml(text, type) {
        const m = {
          blue: "chip-b",
          red: "chip-r",
          green: "chip-g",
          amber: "chip-a",
          gray: "chip-s",
        };
        return `<span class="chip ${m[type] || "chip-s"}">${text}</span>`;
      }
      function badgeHtml(s) {
        const m = {
          pass: "badge-pass",
          fail: "badge-fail",
          warn: "badge-warn",
          skip: "badge-skip",
        };
        const l = { pass: "통과", fail: "실패", warn: "경고", skip: "스킵" };
        return `<span class="badge ${m[s] || "badge-skip"}">${l[s] || s}</span>`;
      }
      function passColor(rate) {
        if (rate >= 95) return "#1A4F9C";
        if (rate >= 90) return "#FF9800";
        return "#F44336";
      }
      function passTextClass(rate) {
        if (rate >= 95) return "";
        if (rate >= 90) return "amber";
        return "red";
      }

      /* ─────────────────────────────────────────────────────────
   KPI section
───────────────────────────────────────────────────────── */
      function renderKPI(kpi) {
        document.getElementById("kpi-date-label").textContent =
          `오늘의 품질 지표 — ${fmt(today)}`;

        const items = [
          {
            label: "전체 테스트 통과율",
            val: kpi.overallPassRate + "%",
            valClass:
              kpi.overallPassRate >= 95
                ? "green"
                : kpi.overallPassRate >= 90
                  ? "amber"
                  : "red",
            delta: kpi.overallPassRateDelta,
            barPct: kpi.overallPassRate,
            barColor: passColor(kpi.overallPassRate),
          },
          {
            label: "총 실행 테스트",
            val: kpi.totalTests.toLocaleString(),
            valClass: "",
            delta: `오늘 신규 실행 ${kpi.todayRun}건`,
            barPct: 100,
            barColor: "#9E9E9E",
          },
          {
            label: "활성 결함 (P1~P3)",
            val: kpi.activeDefects,
            valClass: kpi.activeDefects > 0 ? "red" : "green",
            delta: `P1: ${kpi.p1}건  P2: ${kpi.p2}건  P3: ${kpi.p3}건`,
            barPct: Math.min(kpi.activeDefects * 8, 100),
            barColor: "#F44336",
          },
          {
            label: "긴급 배포 (이번 달)",
            val: kpi.emergencyDeploy,
            valClass:
              kpi.emergencyDeploy >= 5
                ? "red"
                : kpi.emergencyDeploy >= 3
                  ? "amber"
                  : "",
            delta: kpi.emergencyDeployDelta,
            barPct: Math.min(kpi.emergencyDeploy * 10, 100),
            barColor: "#FF9800",
          },
          {
            label: "API 응답시간 p95",
            val: kpi.apiP95 + '<span class="unit">ms</span>',
            valClass: kpi.apiP95 > 500 ? "red" : "",
            delta: `목표 ${kpi.apiTarget}ms 이내 — ${kpi.apiP95 <= kpi.apiTarget ? "양호" : "초과"}`,
            barPct: Math.min((kpi.apiP95 / kpi.apiTarget) * 100, 100),
            barColor: kpi.apiP95 <= kpi.apiTarget ? "#1A4F9C" : "#F44336",
          },
        ];

        document.getElementById("kpi-row").innerHTML = items
          .map(
            (k) => `
    <div class="kpi">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-val ${k.valClass}">${k.val}</div>
      <div class="kpi-delta">${k.delta}</div>
      <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${k.barPct}%;background:${k.barColor};"></div></div>
    </div>
  `,
          )
          .join("");
      }

      /* ─────────────────────────────────────────────────────────
   Report card section (2~5)
───────────────────────────────────────────────────────── */
      function renderReportCard(r) {
        const rate =
          r.passRate ??
          Math.round((r.pass / (r.pass + r.fail + r.warn + r.skip)) * 100);
        const tableRows = (r.cases || [])
          .map(
            (c) => `
    <tr>
      <td>${c.name}</td>
      ${r.colPlatform ? `<td>${chipHtml(c.platform, "blue")}</td>` : ""}
      <td>${statusDot(c.status)}${statusLabel(c.status)}</td>
      <td>${c.duration || "—"}</td>
      <td>${c.note ? chipHtml(c.note, c.noteType || "blue") : "—"}</td>
    </tr>
  `,
          )
          .join("");

        const col3Header = r.colPlatform ? "<th>플랫폼</th>" : "";
        const durationHeader = r.colDuration || "응답시간";

        return `
    <div class="report-card">
      <div class="rc-header">
        <div class="rc-title-row">
          <div class="rc-icon" style="background:${r.iconBg};color:${r.iconColor};">${r.iconLabel}</div>
          <div class="rc-title">${r.title}</div>
          ${badgeHtml(r.overallStatus)}
        </div>
        <div class="rc-meta">실행: ${r.runTime} · ${r.total}건${r.metaExtra ? " · " + r.metaExtra : ""}</div>
      </div>
      <div class="rc-stats">
        <div class="rc-stat"><div class="rc-stat-label">통과</div><div class="rc-stat-val green">${r.pass}</div></div>
        <div class="rc-stat"><div class="rc-stat-label">실패</div><div class="rc-stat-val red">${r.fail}</div></div>
        <div class="rc-stat"><div class="rc-stat-label">경고</div><div class="rc-stat-val amber">${r.warn}</div></div>
        <div class="rc-stat"><div class="rc-stat-label">스킵</div><div class="rc-stat-val gray">${r.skip}</div></div>
      </div>
      <table class="mini-table">
        <thead><tr><th>${r.col1Header || "이름"}</th>${col3Header}<th>상태</th><th>${durationHeader}</th><th>비고</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
      <div class="prog-row">
        <span class="prog-label">통과율</span>
        <div class="prog-track"><div class="prog-fill" style="width:${rate}%;background:${passColor(rate)};"></div></div>
        <span class="prog-val ${passTextClass(rate)}">${rate}%</span>
      </div>
    </div>
  `;
      }

      function renderReports(reports) {
        document.getElementById("reports-grid").innerHTML = reports
          .map(renderReportCard)
          .join("");
      }

      /* ─────────────────────────────────────────────────────────
   Chart section (6)
───────────────────────────────────────────────────────── */
      function renderChart(monthly) {
        const W = 860,
          PAD_L = 50,
          PAD_R = 20,
          PAD_T = 20,
          PAD_B = 30;
        const chartW = W - PAD_L - PAD_R;
        const chartH = 130;
        const threshold = 5;

        const maxVal = Math.max(...monthly.map((m) => m.count), threshold + 1);
        const yTop = Math.ceil(maxVal / 2) * 2;
        const ySteps = 4;
        const stepVal = yTop / ySteps;

        function yPos(v) {
          return PAD_T + chartH - (v / yTop) * chartH;
        }

        const n = monthly.length;
        const xGap = chartW / Math.max(n - 1, 1);
        const points = monthly.map((m, i) => ({
          x: PAD_L + (n === 1 ? chartW / 2 : i * xGap),
          y: yPos(m.count),
          val: m.count,
          label: m.label,
          isOver: m.count >= threshold,
        }));

        // Grid lines
        let gridLines = "";
        for (let i = 0; i <= ySteps; i++) {
          const v = i * stepVal;
          const y = yPos(v);
          gridLines += `<line x1="${PAD_L}" y1="${y}" x2="${W - PAD_R}" y2="${y}" stroke="#e4e8ed" stroke-width="0.5"/>`;
          gridLines += `<text x="${PAD_L - 6}" y="${y + 4}" font-size="10" fill="#9aa3b0" text-anchor="end" font-family="'Pretendard',sans-serif">${v}</text>`;
        }

        // Threshold line
        const ty = yPos(threshold);
        const thresholdLine = `
    <line x1="${PAD_L}" y1="${ty}" x2="${W - PAD_R}" y2="${ty}" stroke="#F44336" stroke-width="1" stroke-dasharray="5 4" opacity="0.65"/>
    <text x="${W - PAD_R + 4}" y="${ty + 4}" font-size="9" fill="#F44336" font-family="'Pretendard',sans-serif">${threshold}</text>
  `;

        // Area fill
        const ptStr = points.map((p) => `${p.x},${p.y}`).join(" ");
        const areaPath =
          `M${points[0].x},${points[0].y} ` +
          points
            .slice(1)
            .map((p) => `L${p.x},${p.y}`)
            .join(" ") +
          ` L${points[points.length - 1].x},${PAD_T + chartH} L${points[0].x},${PAD_T + chartH} Z`;

        // Line
        const linePath = `M${points.map((p) => `${p.x},${p.y}`).join(" L")}`;

        // Dots & labels
        const dotsSVG = points
          .map(
            (p) => `
    <circle cx="${p.x}" cy="${p.y}" r="${p === points[points.length - 1] ? 5 : 4}"
      fill="${p.isOver ? "#F44336" : "#1A4F9C"}"
      stroke="white" stroke-width="1.5"/>
    <text x="${p.x}" y="${p.y - 9}" font-size="11" font-weight="700"
      text-anchor="middle" fill="${p.isOver ? "#C62828" : "#1A4F9C"}"
      font-family="'Pretendard',sans-serif">${p.val}</text>
  `,
          )
          .join("");

        // X labels
        const xLabels = points
          .map((p, i) => {
            const isLast = i === points.length - 1;
            return `<text x="${p.x}" y="${PAD_T + chartH + 18}" font-size="11" text-anchor="middle"
      fill="${p.isOver ? "#C62828" : isLast ? "#1A4F9C" : "#5a6477"}"
      font-weight="${isLast ? "700" : "400"}"
      font-family="'Pretendard',sans-serif">${p.label}</text>`;
          })
          .join("");

        const H = PAD_T + chartH + PAD_B;
        const svgH = H;

        document.getElementById("chart-wrap").innerHTML = `
    <svg viewBox="0 0 ${W} ${svgH}" width="100%" height="${Math.max(160, svgH)}px" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="area-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1A4F9C" stop-opacity="0.12"/>
          <stop offset="100%" stop-color="#1A4F9C" stop-opacity="0"/>
        </linearGradient>
      </defs>
      ${gridLines}
      ${thresholdLine}
      <path d="${areaPath}" fill="url(#area-grad)"/>
      <path d="${linePath}" fill="none" stroke="#1A4F9C" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${dotsSVG}
      ${xLabels}
    </svg>
  `;

        // chart range subtitle
        if (monthly.length > 0) {
          document.getElementById("chart-range").textContent =
            `${monthly[0].label} ~ ${monthly[monthly.length - 1].label}`;
        }
      }

      /* ─────────────────────────────────────────────────────────
   Error state
───────────────────────────────────────────────────────── */
      function showError(msg) {
        const errHtml = `<div class="error-box"><div class="err-icon">⚠️</div>${msg}</div>`;
        document.getElementById("kpi-row").innerHTML = errHtml;
        document.getElementById("reports-grid").innerHTML =
          `<div class="report-card" style="grid-column:1/-1;">${errHtml}</div>`;
        document.getElementById("chart-wrap").innerHTML = errHtml;
        document.getElementById("sys-status").textContent = "데이터 없음";
        document.getElementById("sys-status").style.background = "#FFEBEE";
        document.getElementById("sys-status").style.color = "#C62828";
      }

      /* ─────────────────────────────────────────────────────────
   Main loader
───────────────────────────────────────────────────────── */
      async function loadStats() {
        // Header time
        document.getElementById("run-time").textContent =
          `${fmt(today)} · 마지막 업데이트 ${today.getHours().toString().padStart(2, "0")}:${today.getMinutes().toString().padStart(2, "0")}`;

        try {
          const res = await fetch("./results.json");
          if (!res.ok) throw new Error("HTTP " + res.status);
          const data = await res.json();

          renderKPI(data.kpi);
          renderReports(data.reports);
          renderChart(data.monthlyDeploys);

          if (data.lastUpdated) {
            document.getElementById("footer-updated").textContent =
              "최근 업데이트: " + data.lastUpdated;
          }
        } catch (e) {
          showError(
            "테스트 결과 파일(results.json)을 불러올 수 없습니다.<br>테스트를 먼저 실행하거나 파일 경로를 확인해주세요.",
          );
        }
      }

      loadStats();
    </script>
  </body>
</html>
