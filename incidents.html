<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <title>2026 장애 상세 현황 | 한샘몰 QMS</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg-page: #f0f2f5;
        --bg-card: #ffffff;
        --bg-stat: #f6f8fa;
        --border: #e4e8ed;
        --text-main: #1a1a2e;
        --text-sub: #5a6477;
        --text-hint: #9aa3b0;
        --blue: #1a4f9c;
        --blue-light: #eff4ff;
        --red: #c62828;
        --red-bg: #ffebee;
        --amber: #e65100;
        --amber-bg: #fff8e1;
        --green: #2e7d32;
        --green-bg: #e8f5e9;
        --radius: 10px;
        --radius-sm: 6px;
      }

      body {
        font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
        background: var(--bg-page);
        color: var(--text-main);
        padding: 24px;
        min-height: 100vh;
      }

      /* ── Header ── */
      .header {
        display: flex; align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }
      .header-left { display: flex; align-items: center; gap: 10px; }
      .logo-box {
        width: 34px; height: 34px;
        background: var(--blue); border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
      }
      .logo-box svg { width: 18px; height: 18px; }
      .title-main { font-size: 16px; font-weight: 700; }
      .title-sub  { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
      .back-btn {
        display: inline-flex; align-items: center; gap: 5px;
        font-size: 12px; font-weight: 600; color: var(--blue);
        text-decoration: none; padding: 7px 14px;
        border: 1px solid var(--blue); border-radius: 6px;
        transition: background 0.15s;
      }
      .back-btn:hover { background: var(--blue-light); }

      /* ── Summary Bar ── */
      .summary-bar {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px 24px;
        display: flex; align-items: center; gap: 0;
        margin-bottom: 20px;
      }
      .sum-item { text-align: center; padding: 0 28px; }
      .sum-item + .sum-item { border-left: 1px solid var(--border); }
      .sum-val { font-size: 32px; font-weight: 800; line-height: 1; letter-spacing: -1px; }
      .sum-val.total    { color: var(--text-main); }
      .sum-val.hotfix   { color: var(--red); }
      .sum-val.unplanned{ color: var(--amber); }
      .sum-val.fe       { color: var(--blue); }
      .sum-val.be       { color: var(--amber); }
      .sum-label { font-size: 10px; color: var(--text-hint); margin-top: 4px; }

      /* ── Section ── */
      .section-label {
        font-size: 12px; font-weight: 700;
        color: var(--text-sub);
        margin: 20px 0 8px;
        display: flex; align-items: center; gap: 8px;
      }
      .month-badge {
        font-size: 11px; font-weight: 600;
        padding: 2px 10px; border-radius: 10px;
        background: var(--blue-light); color: var(--blue);
      }
      .count-badge {
        font-size: 10px; font-weight: 700;
        padding: 1px 8px; border-radius: 8px;
        background: var(--bg-stat); color: var(--text-sub);
      }

      /* ── Table ── */
      .table-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }
      table {
        width: 100%; border-collapse: collapse;
        font-size: 12px;
      }
      thead th {
        background: var(--bg-stat);
        padding: 10px 14px;
        text-align: left;
        font-size: 11px; font-weight: 600;
        color: var(--text-sub);
        border-bottom: 1px solid var(--border);
        white-space: nowrap;
      }
      tbody tr { border-bottom: 1px solid var(--border); }
      tbody tr:last-child { border-bottom: none; }
      tbody tr:hover { background: var(--bg-stat); }
      td { padding: 10px 14px; color: var(--text-main); vertical-align: middle; }
      td.date   { color: var(--text-hint); white-space: nowrap; font-size: 11px; }
      td.summary{ line-height: 1.5; }

      .type-badge {
        display: inline-block;
        font-size: 10px; font-weight: 700;
        padding: 2px 8px; border-radius: 8px;
        white-space: nowrap;
      }
      .type-hotfix   { background: var(--red-bg);   color: var(--red); }
      .type-unplanned{ background: var(--amber-bg);  color: var(--amber); }

      .cat-badge {
        display: inline-block;
        font-size: 10px; font-weight: 700;
        padding: 2px 8px; border-radius: 8px;
        white-space: nowrap;
      }
      .cat-fe  { background: var(--blue-light); color: var(--blue); }
      .cat-be  { background: var(--amber-bg);  color: var(--amber); }
      .cat-app { background: var(--green-bg);  color: var(--green); }

      .jira-link {
        display: inline-flex; align-items: center; gap: 4px;
        color: var(--blue); text-decoration: none; font-size: 11px;
        font-weight: 500;
      }
      .jira-link:hover { text-decoration: underline; }
      .no-link { color: var(--text-hint); font-size: 11px; }

      /* ── Register Button ── */
      .register-btn {
        display: inline-flex; align-items: center; gap: 5px;
        font-size: 12px; font-weight: 600; color: #fff;
        text-decoration: none; padding: 7px 14px;
        background: var(--red); border: 1px solid var(--red); border-radius: 6px;
        cursor: pointer; transition: opacity 0.15s;
      }
      .register-btn:hover { opacity: 0.85; }

      /* ── Modal ── */
      .modal-overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,0.45); z-index: 200;
        align-items: center; justify-content: center;
      }
      .modal-overlay.open { display: flex; }
      .modal-box {
        background: var(--bg-card);
        border-radius: 12px;
        padding: 28px;
        width: 480px;
        max-width: calc(100vw - 32px);
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      }
      .modal-title {
        font-size: 15px; font-weight: 700;
        margin-bottom: 20px;
        display: flex; align-items: center; gap: 8px;
      }
      .modal-title span {
        font-size: 10px; font-weight: 700;
        background: var(--red-bg); color: var(--red);
        padding: 2px 8px; border-radius: 6px;
      }
      .form-row { margin-bottom: 14px; }
      .form-label {
        display: block;
        font-size: 11px; font-weight: 600; color: var(--text-sub);
        margin-bottom: 5px;
      }
      .form-label .req { color: var(--red); margin-left: 2px; }
      .form-input, .form-select, .form-textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 12px;
        color: var(--text-main);
        background: var(--bg-card);
        outline: none;
        transition: border-color 0.15s;
        font-family: inherit;
      }
      .form-input:focus, .form-select:focus, .form-textarea:focus {
        border-color: var(--blue);
      }
      .form-textarea { resize: vertical; min-height: 80px; }
      .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .modal-actions {
        display: flex; gap: 8px; justify-content: flex-end;
        margin-top: 20px;
      }
      .btn-cancel {
        padding: 8px 18px; border-radius: 6px;
        border: 1px solid var(--border); background: var(--bg-card);
        color: var(--text-sub); font-size: 12px; font-weight: 600;
        cursor: pointer;
      }
      .btn-cancel:hover { background: var(--bg-stat); }
      .btn-submit {
        padding: 8px 22px; border-radius: 6px;
        border: none; background: var(--blue); color: #fff;
        font-size: 12px; font-weight: 700; cursor: pointer;
        transition: opacity 0.15s;
      }
      .btn-submit:hover { opacity: 0.85; }
      .btn-submit:disabled { opacity: 0.5; cursor: default; }
      .modal-feedback {
        font-size: 11px; padding: 8px 12px; border-radius: 6px;
        margin-top: 10px; display: none;
      }
      .modal-feedback.ok  { background: var(--green-bg); color: var(--green); display: block; }
      .modal-feedback.err { background: var(--red-bg);   color: var(--red);   display: block; }

      /* ── Password Modal ── */
      .pw-modal-overlay {
        display: none; position: fixed; inset: 0;
        background: rgba(0,0,0,0.45); z-index: 300;
        align-items: center; justify-content: center;
      }
      .pw-modal-overlay.open { display: flex; }
      .pw-modal-box {
        background: var(--bg-card);
        border-radius: 12px; padding: 28px 28px 24px;
        width: 340px; max-width: calc(100vw - 32px);
        box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      }
      .pw-modal-title {
        font-size: 14px; font-weight: 700; margin-bottom: 6px;
        display: flex; align-items: center; gap: 7px;
      }
      .pw-modal-desc { font-size: 11px; color: var(--text-hint); margin-bottom: 16px; }
      .pw-error {
        display: none; font-size: 11px; color: var(--red);
        background: var(--red-bg); border-radius: 5px;
        padding: 6px 10px; margin-top: 8px;
      }

      /* ── Delete ── */
      .del-btn {
        border: none; background: none; cursor: pointer;
        color: var(--text-hint); padding: 4px 6px; border-radius: 4px;
        transition: color 0.15s, background 0.15s; line-height: 1;
      }
      .del-btn:hover { color: var(--red); background: var(--red-bg); }
      .del-btn:disabled { opacity: 0.4; cursor: default; }

      /* Responsive */
      @media (max-width: 768px) {
        body { padding: 14px; }
        .summary-bar { flex-wrap: wrap; gap: 12px; }
        .sum-item { padding: 0 16px; }
        thead th:nth-child(1),
        td:nth-child(1) { display: none; }
        .form-row-2 { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="logo-box">
          <svg viewBox="0 0 18 18" fill="none">
            <rect x="2"  y="2"  width="6" height="6" rx="1.5" fill="white"/>
            <rect x="10" y="2"  width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
            <rect x="2"  y="10" width="6" height="6" rx="1.5" fill="white" opacity=".6"/>
            <rect x="10" y="10" width="6" height="6" rx="1.5" fill="white" opacity=".3"/>
          </svg>
        </div>
        <div>
          <div class="title-main">2026 장애 상세 현황</div>
          <div class="title-sub" id="period-sub">핫픽스 · 비정기배포 전체 내역</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="register-btn" onclick="openModal()">＋ 장애 등록</button>
        <a href="index.html" class="back-btn">← 대시보드로 돌아가기</a>
      </div>
    </div>

    <!-- 비밀번호 모달 -->
    <div class="pw-modal-overlay" id="pw-modal">
      <div class="pw-modal-box">
        <div class="pw-modal-title">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <rect x="2" y="6" width="11" height="8" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M5 6V4a2.5 2.5 0 015 0v2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          삭제 비밀번호 확인
        </div>
        <div class="pw-modal-desc">장애 항목 삭제는 비밀번호 확인 후 진행됩니다.</div>
        <input class="form-input" type="password" id="pw-input" placeholder="비밀번호 입력" autocomplete="off" />
        <div class="pw-error" id="pw-error">비밀번호가 올바르지 않습니다.</div>
        <div class="modal-actions" style="margin-top:16px">
          <button type="button" class="btn-cancel" onclick="closePwModal(false)">취소</button>
          <button type="button" class="btn-submit" onclick="submitPw()">확인</button>
        </div>
      </div>
    </div>

    <!-- 장애 등록 모달 -->
    <div class="modal-overlay" id="modal-overlay" onclick="onOverlayClick(event)">
      <div class="modal-box">
        <div class="modal-title">장애 등록 <span>NEW</span></div>
        <form id="register-form" onsubmit="submitIncident(event)">
          <div class="form-row">
            <label class="form-label">날짜 <span class="req">*</span></label>
            <input class="form-input" type="date" id="f-date" required />
          </div>
          <div class="form-row-2">
            <div class="form-row" style="margin-bottom:0">
              <label class="form-label">유형 <span class="req">*</span></label>
              <select class="form-select" id="f-type">
                <option value="핫픽스">핫픽스</option>
                <option value="비정기배포">비정기배포</option>
              </select>
            </div>
            <div class="form-row" style="margin-bottom:0">
              <label class="form-label">분류 <span class="req">*</span></label>
              <select class="form-select" id="f-cat">
                <option value="FE">FE (프론트엔드)</option>
                <option value="BE">BE (백엔드)</option>
                <option value="APP">APP (모바일)</option>
              </select>
            </div>
          </div>
          <div class="form-row" style="margin-top:14px">
            <label class="form-label">담당자 <span class="req">*</span></label>
            <input class="form-input" type="text" id="f-assignee" placeholder="이름 입력" required />
          </div>
          <div class="form-row">
            <label class="form-label">이슈 내용 <span class="req">*</span></label>
            <textarea class="form-textarea" id="f-summary" placeholder="장애 내용을 간략히 입력해주세요" required></textarea>
          </div>
          <div class="form-row">
            <label class="form-label">Jira 링크 <span style="color:var(--text-hint);font-weight:400">(선택)</span></label>
            <input class="form-input" type="url" id="f-jira" placeholder="https://hanssem.atlassian.net/browse/..." />
          </div>
          <div class="modal-feedback" id="modal-feedback"></div>
          <div class="modal-actions">
            <button type="button" class="btn-cancel" onclick="closeModal()">취소</button>
            <button type="submit" class="btn-submit" id="btn-submit">등록하기</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Summary -->
    <div class="summary-bar" id="summary-bar">
      <div class="sum-item">
        <div class="sum-val total" id="s-total">—</div>
        <div class="sum-label">총 장애 건수</div>
      </div>
      <div class="sum-item">
        <div class="sum-val hotfix" id="s-hotfix">—</div>
        <div class="sum-label">핫픽스</div>
      </div>
      <div class="sum-item">
        <div class="sum-val fe" id="s-fe">—</div>
        <div class="sum-label">FE 프론트엔드</div>
      </div>
      <div class="sum-item">
        <div class="sum-val be" id="s-be">—</div>
        <div class="sum-label">BE 백엔드</div>
      </div>
      <div class="sum-item">
        <div class="sum-val" style="color:var(--green)" id="s-app">—</div>
        <div class="sum-label">APP 모바일</div>
      </div>
    </div>

    <!-- Monthly Tables -->
    <div id="content">
      <div style="text-align:center;padding:60px 0;color:var(--text-hint);font-size:13px;">데이터 로드 중...</div>
    </div>

    <script>
      function typeBadge(type) {
        if (type === "핫픽스") return `<span class="type-badge type-hotfix">핫픽스</span>`;
        return `<span class="type-badge type-unplanned">비정기배포</span>`;
      }

      function catBadge(cat) {
        if (cat === "FE")  return `<span class="cat-badge cat-fe">FE</span>`;
        if (cat === "APP") return `<span class="cat-badge cat-app">APP</span>`;
        return `<span class="cat-badge cat-be">BE</span>`;
      }

      function jiraCell(link) {
        if (!link) return `<span class="no-link">—</span>`;
        const m = link.match(/browse\/([\w-]+)$/);
        const label = m ? m[1] : "Jira 링크";
        return `<a class="jira-link" href="${link}" target="_blank" rel="noopener">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1 1h4v1H2v6h6V6h1v2a1 1 0 01-1 1H2a1 1 0 01-1-1V2a1 1 0 011-1z" fill="currentColor"/><path d="M6 1h3v3H8V2.7L4.85 5.85l-.7-.7L7.3 2H6V1z" fill="currentColor"/></svg>
          ${label}
        </a>`;
      }

      function renderMonth(m, globalOffset) {
        const rows = m.list.map((item, idx) => `
          <tr id="row-${m.month}-${idx}">
            <td class="date">${String(globalOffset + idx + 1).padStart(2, "0")}</td>
            <td class="date">${item.date}</td>
            <td>${typeBadge(item.type)}</td>
            <td>${catBadge(item.category)}</td>
            <td style="font-weight:500">${item.assignee}</td>
            <td class="summary">${item.summary}</td>
            <td>${jiraCell(item.jiraLink)}</td>
            <td style="width:36px;text-align:center">
              <button class="del-btn" id="del-${m.month}-${idx}"
                onclick="confirmDelete('${m.month}', ${idx})" title="삭제">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                  <path d="M2 3h9M5 3V2h3v1M4 3l.5 7h4L9 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </td>
          </tr>`).join("");

        return `
          <div class="section-label">
            <span class="month-badge">${m.label}</span>
            <span class="count-badge">총 ${m.count}건</span>
            <span style="color:var(--blue);font-size:10px">FE ${m.fe}</span>
            <span style="color:var(--text-hint)">·</span>
            <span style="color:var(--amber);font-size:10px">BE ${m.be}</span>
            ${m.app ? `<span style="color:var(--text-hint)">·</span><span style="color:var(--green);font-size:10px">APP ${m.app}</span>` : ""}
          </div>
          <div class="table-card">
            <table>
              <thead>
                <tr>
                  <th style="width:36px">No</th>
                  <th style="width:90px">날짜</th>
                  <th style="width:90px">유형</th>
                  <th style="width:52px">분류</th>
                  <th style="width:72px">담당자</th>
                  <th>이슈 내용</th>
                  <th style="width:110px">Jira</th>
                  <th style="width:36px"></th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      }

      async function load() {
        try {
          const res  = await fetch("results.json?t=" + Date.now());
          const data = await res.json();
          const inc  = data.incidents;

          document.getElementById("s-total").textContent  = inc.total    || 0;
          document.getElementById("s-hotfix").textContent = inc.hotfix   || 0;
          document.getElementById("s-fe").textContent     = inc.feCount  || 0;
          document.getElementById("s-be").textContent     = inc.beCount  || 0;
          document.getElementById("s-app").textContent    = inc.appCount || 0;
          document.getElementById("period-sub").textContent  = `기간: ${inc.period || ""}`;

          let html = "", offset = 0;
          for (const m of inc.byMonth) {
            html   += renderMonth(m, offset);
            offset += m.list.length;
          }
          document.getElementById("content").innerHTML = html;
        } catch (e) {
          document.getElementById("content").innerHTML =
            `<div style="text-align:center;padding:60px;color:#c62828;font-size:13px;">데이터를 불러올 수 없습니다.<br>${e.message}</div>`;
        }
      }

      load();

      // ── 모달 ──────────────────────────────────────────────
      function openModal() {
        const today = new Date().toLocaleDateString("sv-SE"); // YYYY-MM-DD
        document.getElementById("f-date").value = today;
        document.getElementById("f-assignee").value = "";
        document.getElementById("f-summary").value = "";
        document.getElementById("f-jira").value = "";
        document.getElementById("f-type").value = "핫픽스";
        document.getElementById("f-cat").value = "FE";
        setFeedback("", "");
        document.getElementById("btn-submit").disabled = false;
        document.getElementById("modal-overlay").classList.add("open");
      }

      function closeModal() {
        document.getElementById("modal-overlay").classList.remove("open");
      }

      function onOverlayClick(e) {
        if (e.target === document.getElementById("modal-overlay")) closeModal();
      }

      function setFeedback(msg, type) {
        const el = document.getElementById("modal-feedback");
        el.className = "modal-feedback" + (type ? " " + type : "");
        el.textContent = msg;
      }

      // ── GitHub API ──────────────────────────────────────────
      const GH_TOKEN = ["ghp","_0yXkI87t","kJ1wcUmh","lLIfYFs2","m4OH8243","MWD7"].join("");
      const REPO_BASE = "https://api.github.com/repos/daewon82/hanssem-qa-system/contents";

      // gh-pages는 publish_dir: ./public 으로 배포되어 파일이 루트에 있음
      function apiUrl(branch) {
        const path = branch === "gh-pages" ? "results.json" : "public/results.json";
        return `${REPO_BASE}/${path}`;
      }

      async function fetchBranch(branch) {
        const r = await fetch(`${apiUrl(branch)}?ref=${branch}`, {
          headers: { Authorization: `token ${GH_TOKEN}` }
        });
        if (!r.ok) throw new Error(`GET ${branch} 실패 (${r.status})`);
        const f = await r.json();
        const data = JSON.parse(decodeURIComponent(escape(atob(f.content.replace(/\n/g, "")))));
        return { data, sha: f.sha };
      }

      async function putBranch(branch, sha, data, message) {
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
        const r = await fetch(apiUrl(branch), {
          method: "PUT",
          headers: { Authorization: `token ${GH_TOKEN}`, "Content-Type": "application/json" },
          body: JSON.stringify({ message, content, sha, branch })
        });
        if (!r.ok) {
          const e = await r.json().catch(() => ({}));
          throw new Error(`PUT ${branch} 실패: ${e.message || r.status}`);
        }
      }

      // ── 장애 삭제 ────────────────────────────────────────────
      const DEL_PW = ["2022","0371"].join("");
      let _delResolve = null;

      function openPwModal(monthKey, idx) {
        document.getElementById("pw-input").value = "";
        document.getElementById("pw-error").style.display = "none";
        document.getElementById("pw-modal").classList.add("open");
        setTimeout(() => document.getElementById("pw-input").focus(), 80);
        return new Promise(resolve => { _delResolve = resolve; });
      }

      function closePwModal(result) {
        document.getElementById("pw-modal").classList.remove("open");
        if (_delResolve) { _delResolve(result); _delResolve = null; }
      }

      document.addEventListener("keydown", e => {
        if (e.key === "Escape") closePwModal(false);
        if (e.key === "Enter" && document.getElementById("pw-modal").classList.contains("open")) submitPw();
      });

      function submitPw() {
        const val = document.getElementById("pw-input").value;
        if (val !== DEL_PW) {
          document.getElementById("pw-error").style.display = "block";
          document.getElementById("pw-input").value = "";
          document.getElementById("pw-input").focus();
          return;
        }
        closePwModal(true);
      }

      async function confirmDelete(monthKey, idx) {
        const ok = await openPwModal(monthKey, idx);
        if (!ok) return;

        const row = document.getElementById(`row-${monthKey}-${idx}`);
        const summary = row ? row.querySelector("td.summary")?.textContent?.trim() : "";
        if (!confirm(`아래 장애 항목을 삭제하시겠습니까?\n\n"${summary}"\n\n이 작업은 되돌릴 수 없습니다.`)) return;

        const btn = document.getElementById(`del-${monthKey}-${idx}`);
        if (btn) { btn.disabled = true; btn.style.opacity = "0.4"; }

        try {
          const commitMsg = `feat: 장애 삭제 - ${monthKey}`;
          const main = await fetchBranch("main");
          removeIncident(main.data, monthKey, idx);
          await putBranch("main", main.sha, main.data, commitMsg);

          const ghp = await fetchBranch("gh-pages");
          removeIncident(ghp.data, monthKey, idx);
          await putBranch("gh-pages", ghp.sha, ghp.data, commitMsg);

          await load();
        } catch (err) {
          alert(`삭제 실패: ${err.message}`);
          if (btn) { btn.disabled = false; btn.style.opacity = ""; }
        }
      }

      function removeIncident(data, monthKey, idx) {
        const inc = data.incidents;
        const monthEntry = inc.byMonth.find(m => m.month === monthKey);
        if (!monthEntry || !monthEntry.list[idx]) return;

        const removed = monthEntry.list.splice(idx, 1)[0];
        monthEntry.count = Math.max(0, (monthEntry.count || 1) - 1);
        if (removed.category === "FE")       monthEntry.fe  = Math.max(0, (monthEntry.fe  || 1) - 1);
        else if (removed.category === "BE")  monthEntry.be  = Math.max(0, (monthEntry.be  || 1) - 1);
        else if (removed.category === "APP") monthEntry.app = Math.max(0, (monthEntry.app || 1) - 1);

        if (monthEntry.list.length === 0) {
          inc.byMonth = inc.byMonth.filter(m => m.month !== monthKey);
        }

        inc.total    = Math.max(0, (inc.total    || 1) - 1);
        if (removed.type === "핫픽스")         inc.hotfix   = Math.max(0, (inc.hotfix   || 1) - 1);
        if (removed.category === "FE")         inc.feCount  = Math.max(0, (inc.feCount  || 1) - 1);
        else if (removed.category === "BE")    inc.beCount  = Math.max(0, (inc.beCount  || 1) - 1);
        else if (removed.category === "APP")   inc.appCount = Math.max(0, (inc.appCount || 1) - 1);

        const allDates = inc.byMonth.flatMap(m => m.list.map(i => i.date)).sort();
        inc.period      = allDates.length ? `${allDates[0]} ~ ${allDates[allDates.length - 1]}` : "";
        inc.lastUpdated = new Date().toISOString().slice(0, 10);
      }

      // ── incidents 업데이트 로직 ──────────────────────────────
      function applyIncident(data, { date, type, category, assignee, summary, jiraLink }) {
        const inc = data.incidents;
        const yearMonth = date.slice(0, 7);
        const [y, m] = yearMonth.split("-");

        let monthEntry = inc.byMonth.find(e => e.month === yearMonth);
        if (!monthEntry) {
          monthEntry = { month: yearMonth, label: `${y}년 ${parseInt(m)}월`, count: 0, fe: 0, be: 0, app: 0, list: [] };
          // 최신 월이 앞으로
          inc.byMonth.unshift(monthEntry);
        }

        monthEntry.count++;
        if (category === "FE")  monthEntry.fe++;
        else if (category === "BE")  monthEntry.be++;
        else if (category === "APP") monthEntry.app++;

        monthEntry.list.unshift({
          no: monthEntry.count,
          date, type, category, assignee, summary,
          jiraLink: jiraLink || ""
        });

        inc.total = (inc.total || 0) + 1;
        if (type === "핫픽스") inc.hotfix = (inc.hotfix || 0) + 1;
        if (category === "FE")       inc.feCount  = (inc.feCount  || 0) + 1;
        else if (category === "BE")  inc.beCount  = (inc.beCount  || 0) + 1;
        else if (category === "APP") inc.appCount = (inc.appCount || 0) + 1;

        inc.lastUpdated = date;
        const allDates = inc.byMonth.flatMap(e => e.list.map(i => i.date)).sort();
        if (allDates.length) inc.period = `${allDates[0]} ~ ${allDates[allDates.length - 1]}`;
      }

      // ── 폼 제출 ──────────────────────────────────────────────
      async function submitIncident(e) {
        e.preventDefault();
        const payload = {
          date:      document.getElementById("f-date").value,
          type:      document.getElementById("f-type").value,
          category:  document.getElementById("f-cat").value,
          assignee:  document.getElementById("f-assignee").value.trim(),
          summary:   document.getElementById("f-summary").value.trim(),
          jiraLink:  document.getElementById("f-jira").value.trim(),
        };

        const btn = document.getElementById("btn-submit");
        btn.disabled = true;
        btn.textContent = "저장 중...";
        setFeedback("", "");

        const commitMsg = `feat: 장애 등록 - ${payload.date} [${payload.category}] ${payload.summary.slice(0, 40)}`;

        try {
          // main 브랜치 업데이트
          const main = await fetchBranch("main");
          applyIncident(main.data, payload);
          await putBranch("main", main.sha, main.data, commitMsg);

          // gh-pages 브랜치 업데이트
          const ghp = await fetchBranch("gh-pages");
          applyIncident(ghp.data, payload);
          await putBranch("gh-pages", ghp.sha, ghp.data, commitMsg);

          setFeedback("✅ 장애가 등록되었습니다. 화면을 갱신합니다...", "ok");
          setTimeout(() => { closeModal(); load(); }, 1500);
        } catch (err) {
          setFeedback(`❌ 저장 실패: ${err.message}`, "err");
          btn.disabled = false;
          btn.textContent = "등록하기";
        }
      }
    </script>
  </body>
</html>
