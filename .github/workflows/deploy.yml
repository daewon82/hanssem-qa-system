name: Deploy to Vercel

on:
  workflow_dispatch: # 수동 배포 전용

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: |
          for i in 1 2 3; do
            echo "🚀 Vercel 배포 시도 $i/3"
            vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes && echo "✅ 배포 성공" && exit 0
            echo "⚠️ 배포 실패, 30초 후 재시도..."
            sleep 30
          done
          echo "❌ 3회 시도 후 배포 실패"
          exit 1
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
