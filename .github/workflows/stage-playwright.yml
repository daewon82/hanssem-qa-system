name: Stage Playwright Tests

on:
  workflow_dispatch: # 수동 실행 전용

permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 300
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure /etc/hosts for Stage
        run: |
          sudo bash -c "echo '10.2.4.81 stg-image.hanssem.com' >> /etc/hosts"
          sudo bash -c "echo '10.2.4.83 image2.hanssem.com' >> /etc/hosts"
          sudo bash -c "echo '10.206.210.44 stg-store.hanssem.com' >> /etc/hosts"
          sudo bash -c "echo '10.206.211.202 stg-store.hanssem.com' >> /etc/hosts"
          sudo bash -c "echo '10.206.211.216 stg-m.store.hanssem.com' >> /etc/hosts"
          sudo bash -c "echo '10.206.210.199 stg-m.store.hanssem.com' >> /etc/hosts"
          sudo bash -c "echo '10.200.4.136 stagemall.hanssem.com' >> /etc/hosts"
          sudo bash -c "echo '10.206.211.161 stg-m.remodeling.hanssem.com' >> /etc/hosts"
          sudo bash -c "echo '10.206.210.63 stg-m.remodeling.hanssem.com' >> /etc/hosts"
          echo "✅ /etc/hosts 설정 완료"
          cat /etc/hosts | grep hanssem

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Stage Playwright tests
        run: npx playwright test --config playwright.stage.config.ts
        continue-on-error: true
        env:
          CI: "" # 잔디 알림 임시 중단
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add public/results.json public/stg_pc_500.json public/stg_pc_e2e.json public/stg_mw_500.json public/stg_mw_e2e.json

          git commit -m "auto update stage $(date +'%s') [skip ci]" || echo "no changes"

          git pull --rebase origin main
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: stage-playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Fail Evidence
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: stage-fail-evidence
          path: fail_evidence/
          retention-days: 30
