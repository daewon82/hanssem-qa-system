name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 23 * * *" # KST 08시 (UTC 23시 = KST 다음날 08시)
  workflow_dispatch: # 수동 실행 버튼

permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 300
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add public/results.json public/pc_500.json public/pc_e2e.json

          git commit -m "auto update $(date +'%s') [skip ci]" || echo "no changes"

          git push --force-with-lease || git push --force

      - name: Deploy to Vercel
        run: |
          for i in 1 2 3; do
            echo "🚀 Vercel 배포 시도 $i/3"
            npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes && echo "✅ 배포 성공" && exit 0
            echo "⚠️ 배포 실패, 30초 후 재시도..."
            sleep 30
          done
          echo "❌ 3회 시도 후 배포 실패"
          exit 1
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Fail Evidence
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: fail-evidence
          path: fail_evidence/
          retention-days: 30
