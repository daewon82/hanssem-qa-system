name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 23 * * *" # KST 08시 (UTC 23시 = KST 다음날 08시)

# git push 허용
permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 120
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git User
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          echo "🚀 운영 PC 500개 랜딩 테스트 시작"
          npx playwright test
          echo "✅ 테스트 완료"
        continue-on-error: true

      # results.json 변경사항 커밋 & 푸시 (한국 시간 기준)
      - name: Commit and push results.json
        run: |
          git add public/results.json
          KST=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S KST')
          git diff --staged --quiet || git commit -m "자비스 리포트 업데이트: ${KST}"
          git push
        continue-on-error: true

      # Vercel 배포
      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Fail Evidence
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: fail-evidence
          path: fail_evidence/
          retention-days: 30
