name: Playwright Tests

on:
  workflow_dispatch: # daily-trigger.yml 또는 수동 실행
    inputs:
      test_filter:
        description: "실행할 테스트 (all / pc-landing / mw-landing / pc-random / mw-random / pc-e2e / mw-e2e)"
        required: false
        default: "all"
        type: string

permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 300
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Write last commit date to results.json
        run: |
          node -e "
          const fs = require('fs');
          const { execSync } = require('child_process');
          const raw = execSync('git log --format=\"%ci\" --invert-grep --grep=\"auto update\" -1').toString().trim();
          const d = new Date(raw);
          const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
          const fmt = kst.getFullYear() + '. ' + (kst.getMonth()+1) + '. ' + kst.getDate() + '. ' +
                      String(kst.getHours()).padStart(2,'0') + ':' + String(kst.getMinutes()).padStart(2,'0');
          const data = JSON.parse(fs.readFileSync('public/results.json', 'utf8'));
          data.codeLastModified = fmt;
          fs.writeFileSync('public/results.json', JSON.stringify(data, null, 2));
          "

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          FILTER="${{ inputs.test_filter }}"
          echo "test_filter = $FILTER"
          case "$FILTER" in
            pc-landing) npx playwright test --project=Crawling --grep "PC 랜딩" ;;
            mw-landing) npx playwright test --project=Crawling --grep "MW 랜딩" ;;
            pc-random)  npx playwright test --project=Random   --grep "PC 랜덤" ;;
            mw-random)  npx playwright test --project=Random   --grep "MW 랜덤" ;;
            pc-e2e)     npx playwright test --project=AutoE2E_Public_PC --project=AutoE2E_Authed ;;
            mw-e2e)     npx playwright test --project=AutoE2E_Public_Mobile ;;
            *)          npx playwright test ;;
          esac
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: "--expose-gc --max-old-space-size=4096"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HANSSEM_ID: ${{ secrets.HANSSEM_ID }}
          HANSSEM_PW: ${{ secrets.HANSSEM_PW }}

      - name: Send consolidated Jandi notification
        if: always()
        run: node scripts/send-jandi-summary.js
        continue-on-error: true

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add public/results.json public/pc_500.json public/pc_e2e.json public/mw_500.json public/mw_e2e.json public/pc_random.json public/mw_random.json public/pc_url_pool.json public/mw_url_pool.json public/pc_tested_urls.json public/mw_tested_urls.json

          git commit -m "auto update $(date +'%s') [skip ci]" || echo "no changes"

          git pull --rebase origin main
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Fail Evidence
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: fail-evidence
          path: fail_evidence/
          retention-days: 30
