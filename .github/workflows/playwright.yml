name: Playwright Tests

on:
  workflow_dispatch: # 수동 실행 버튼 (외부 크론 또는 직접 실행)

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 300
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Write last commit date to results.json
        run: |
          node -e "
          const fs = require('fs');
          const { execSync } = require('child_process');
          const raw = execSync('git log -1 --format=\"%ci\"').toString().trim();
          const d = new Date(raw);
          const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
          const fmt = kst.getFullYear() + '. ' + (kst.getMonth()+1) + '. ' + kst.getDate() + '. ' +
                      String(kst.getHours()).padStart(2,'0') + ':' + String(kst.getMinutes()).padStart(2,'0');
          const data = JSON.parse(fs.readFileSync('public/results.json', 'utf8'));
          data.codeLastModified = fmt;
          fs.writeFileSync('public/results.json', JSON.stringify(data, null, 2));
          "

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test
        continue-on-error: true

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add public/results.json public/pc_500.json public/pc_e2e.json public/mw_500.json public/mw_e2e.json

          git commit -m "auto update $(date +'%s') [skip ci]" || echo "no changes"

          git pull --rebase origin main
          git push

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Fail Evidence
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: fail-evidence
          path: fail_evidence/
          retention-days: 30

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
