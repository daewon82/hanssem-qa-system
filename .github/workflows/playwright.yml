name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 23 * * *" # KST 08시 (UTC 23시 = KST 다음날 08시)

# git push 허용
permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 300
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          echo "🚀 운영 PC 500개 랜딩 테스트 시작"
          npx playwright test
          echo "✅ 테스트 완료"
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # results.json 변경사항 커밋 & 푸시 (한국 시간 기준)
      - name: Commit results.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add public/results.json

          git commit -m "🤖 auto: update results ($(date +'%Y-%m-%d %H:%M:%S'))" || echo "no changes"

          git pull --rebase --autostash || true
          git push

      # Vercel 배포

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload Fail Evidence
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: fail-evidence
          path: fail_evidence/
          retention-days: 30

      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
