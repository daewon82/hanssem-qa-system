name: Daily Trigger (KST 05:00)

on:
  schedule:
    - cron: "0 20 * * *" # UTC 20:00 = KST 05:00 (GitHub 지연 2시간 감안 → 실제 실행 ~07:00)
  workflow_dispatch: # 수동 테스트용

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Playwright Tests via API
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: bash scripts/trigger-workflow.sh
