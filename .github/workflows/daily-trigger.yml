name: Daily Trigger (KST 05:00)

on:
  schedule:
    - cron: "0 20 * * *" # UTC 20:00 = KST 05:00 (GitHub 지연 2시간 감안 → 실제 실행 ~07:00)
  workflow_dispatch: # 수동 테스트용

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Playwright Tests via API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/daewon82/hanssem-qa-system/actions/workflows/playwright.yml/dispatches \
            -d '{"ref":"main"}')

          echo "HTTP status: $response"

          if [ "$response" != "204" ]; then
            echo "❌ 트리거 실패 (status: $response)"
            exit 1
          fi

          echo "✅ Playwright Tests 워크플로우 트리거 성공"
