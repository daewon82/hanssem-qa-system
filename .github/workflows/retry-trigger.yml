name: Retry Trigger (KST 08:00)

on:
  schedule:
    - cron: "0 23 * * *" # UTC 23:00 = KST 08:00
  workflow_dispatch:

jobs:
  check-and-retry:
    runs-on: ubuntu-latest
    steps:
      - name: Check if today's test ran, retry if not
        run: |
          # KST 07:00 = UTC 22:00 기준으로 오늘 실행 여부 확인
          TODAY_UTC=$(date -u +%Y-%m-%dT22:00:00Z)

          RUNS=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
            "https://api.github.com/repos/daewon82/hanssem-qa-system/actions/workflows/playwright.yml/runs?per_page=5")

          # 오늘 22:00 UTC 이후 실행된 run이 있는지 확인
          RAN_TODAY=$(echo "$RUNS" | python3 -c "
          import sys, json
          from datetime import datetime, timezone
          runs = json.load(sys.stdin).get('workflow_runs', [])
          cutoff = datetime.fromisoformat('${TODAY_UTC}'.replace('Z', '+00:00'))
          found = any(
            datetime.fromisoformat(r['created_at'].replace('Z', '+00:00')) >= cutoff
            for r in runs
          )
          print('yes' if found else 'no')
          ")

          echo "오늘 테스트 실행 여부: $RAN_TODAY"

          if [ "$RAN_TODAY" = "no" ]; then
            echo "⚠️ 오늘 테스트 미실행 감지 → 재트리거합니다."

            response=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.PAT_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/daewon82/hanssem-qa-system/actions/workflows/playwright.yml/dispatches \
              -d '{"ref":"main"}')

            if [ "$response" = "204" ]; then
              echo "✅ 재트리거 성공"
            else
              echo "❌ 재트리거 실패 (status: $response)"
              exit 1
            fi
          else
            echo "✅ 오늘 테스트 이미 실행됨 — 재트리거 불필요"
          fi
