name: Retry Trigger (KST 06:00)

on:
  schedule:
    - cron: "0 21 * * *" # UTC 21:00 = KST 06:00 (daily-trigger 1h 후 백업)
  workflow_dispatch:

jobs:
  check-and-retry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check if today's test ran, retry if not
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # daily-trigger 시작 시각(UTC 20:00) 기준으로 오늘 실행 여부 판단
          TODAY_UTC=$(date -u +%Y-%m-%dT20:00:00Z)

          RUNS=$(curl -s \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PAT_TOKEN}" \
            "https://api.github.com/repos/daewon82/hanssem-qa-system/actions/workflows/playwright.yml/runs?per_page=5")

          # 오늘 20:00 UTC 이후 실행된 run이 있는지 확인
          RAN_TODAY=$(echo "$RUNS" | python3 -c "
          import sys, json
          from datetime import datetime
          runs = json.load(sys.stdin).get('workflow_runs', [])
          cutoff = datetime.fromisoformat('${TODAY_UTC}'.replace('Z', '+00:00'))
          found = any(
            datetime.fromisoformat(r['created_at'].replace('Z', '+00:00')) >= cutoff
            for r in runs
          )
          print('yes' if found else 'no')
          ")

          echo "오늘 테스트 실행 여부: $RAN_TODAY"

          if [ "$RAN_TODAY" = "no" ]; then
            echo "⚠️ 오늘 테스트 미실행 감지 → 재트리거합니다."
            bash scripts/trigger-workflow.sh
          else
            echo "✅ 오늘 테스트 이미 실행됨 — 재트리거 불필요"
          fi
